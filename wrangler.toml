# Only needed if you deploy the Worker by connecting it to GitHub (Workers Builds).
# If you create the Worker the easy way — "Create Worker" -> Edit code -> paste worker.js -> Deploy —
# you don't need this file at all.
#
# The Worker's name in the Cloudflare dashboard must match "name" below, or wrangler will deploy
# to a Worker with this name instead. Change it to match your Worker if you named it something else.
name = "inventory-count-api"
main = "worker.js"
compatibility_date = "2024-11-06"
